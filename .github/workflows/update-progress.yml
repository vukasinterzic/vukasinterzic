name: Update Progress Forrest

on:
  push:
    branches:
      - master

jobs:
  update-progress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Count 2026 blog posts
        id: count-posts
        run: |
          COUNT=$(curl -s https://azureis.fun/feed.xml | grep -o '<published>2026-[^<]*</published>' | wc -l)
          echo "post_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT posts in 2026"
      
      - name: Determine image
        id: image
        run: |
          COUNT=${{ steps.count-posts.outputs.post_count }}
          # Clamp to max 12 (we have forrest-01 through forrest-12)
          if [ $COUNT -gt 12 ]; then COUNT=12; fi
          IMAGE="forrest-$(printf "%02d" $COUNT).png"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Selected image: $IMAGE"
      
      - name: Update README
        run: |
          COUNT=${{ steps.count-posts.outputs.post_count }}
          IMAGE=${{ steps.image.outputs.image }}
          
          # Build the new progress section
          read -r -d '' NEW_SECTION << 'EOF' || true
          <!-- PROGRESS:START -->
          ### 🌲 2026 Writing Progress: A Growing Forest
          
          *Every article I write helps grow a digital forest. Watch it flourish as I document my journey with Azure and cloud technologies throughout 2026.*
          
          <p align="center">
            <img src="/assets/img/progress-forrest/$IMAGE" alt="Forest Growing with Articles">
          </p>
          
          <p align="center">
            <strong>$COUNT articles written in 2026 so far</strong>
          </p>
          
          <!-- PROGRESS:END -->
          EOF
          
          # Replace the progress section or add it if it doesn't exist
          if grep -q "<!-- PROGRESS:START -->" README.md; then
            # Remove old section and add new one
            sed -i.bak '/<!-- PROGRESS:START -->/,/<!-- PROGRESS:END -->/c\'"$NEW_SECTION" README.md
            rm -f README.md.bak
          else
            # Add section at end of file
            echo "" >> README.md
            echo "$NEW_SECTION" >> README.md
          fi
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          
          # Only commit if there are changes
          if ! git diff --quiet --cached; then
            git commit -m "📊 Update progress: ${{ steps.count-posts.outputs.post_count }} articles in 2026"
            git push
          else
            echo "No changes to commit"
          fi
