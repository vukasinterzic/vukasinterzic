name: Update Progress Forrest

on:
  push:
    branches:
      - master

jobs:
  update-progress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Count 2026 blog posts
        id: count-posts
        run: |
          COUNT=$(curl -s https://azureis.fun/feed.xml | grep -o '<published>2026-[^<]*</published>' | wc -l)
          echo "post_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT posts in 2026"
      
      - name: Determine image
        id: image
        run: |
          COUNT=${{ steps.count-posts.outputs.post_count }}
          # Clamp to max 12 (we have forrest-01 through forrest-12)
          if [ $COUNT -gt 12 ]; then COUNT=12; fi
          IMAGE="forrest-$(printf "%02d" $COUNT).png"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Selected image: $IMAGE"
      
      - name: Update README
        env:
          COUNT: ${{ steps.count-posts.outputs.post_count }}
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          python3 << 'PYTHON_EOF'
          import re
          import os
          
          count = os.environ.get('COUNT', '0')
          image = os.environ.get('IMAGE', 'forrest-01.png')
          
          with open('README.md', 'r') as f:
              content = f.read()
          
          new_section = '<!-- PROGRESS:START -->\n'
          new_section += '### 🌲 2026 Writing Progress: A Growing Forest\n\n'
          new_section += '*Every article I write helps grow a digital forest. Watch it flourish as I document my journey with Azure and cloud technologies throughout 2026.*\n\n'
          new_section += '<p align="center">\n'
          new_section += f'  <img src="/assets/img/progress-forrest/{image}" alt="Forest Growing with Articles">\n'
          new_section += '</p>\n\n'
          new_section += '<p align="center">\n'
          new_section += f'  <strong>{count} articles written in 2026 so far</strong>\n'
          new_section += '</p>\n\n'
          new_section += '<!-- PROGRESS:END -->'
          
          if '<!-- PROGRESS:START -->' in content:
              content = re.sub(
                  r'<!-- PROGRESS:START -->.*?<!-- PROGRESS:END -->',
                  new_section,
                  content,
                  flags=re.DOTALL
              )
          else:
              content += '\n\n' + new_section
          
          with open('README.md', 'w') as f:
              f.write(content)
          PYTHON_EOF
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          
          # Only commit if there are changes
          if ! git diff --quiet --cached; then
            git commit -m "📊 Update progress: ${{ steps.count-posts.outputs.post_count }} articles in 2026"
            git push
          else
            echo "No changes to commit"
          fi
